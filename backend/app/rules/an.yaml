# AN detector configuration (address candidate).

# Enable/disable this detector.
enabled: true

# Province/city root tokens for KR addresses.
sido_pattern: '(?:서울|부산|대구|인천|광주|대전|울산|세종|경기|강원|충북|충남|전북|전남|경북|경남|제주)'

# Candidate regex list for road/lot address strings.
patterns:
  - name: road_address_fast
    # Hyperscan-friendly fast candidate for common road-name addresses.
    expr: '{SIDO}\s+\S+(?:시|군|구)\s+\S+(?:로|길)\s*\d{1,4}(?:-\d{1,4})?'
    verify_regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+[^\n]{0,40}(?:로|길)\s*\d{1,4}(?:-\d{1,4})?(?:[^\n]{0,30})'
    regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+[^\n]{0,40}(?:로|길)\s*\d{1,4}(?:-\d{1,4})?(?:[^\n]{0,30})'
  - name: lot_address_fast
    # Hyperscan-friendly fast candidate for common lot-number addresses.
    expr: '{SIDO}\s+\S+(?:시|군|구)\s+\S+(?:읍|면|동)\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?'
    verify_regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+(?:\S+(?:시|군|구)\s+)?\S+(?:읍|면|동)(?:\s+\S+(?:리|동))?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:\s*번지)?(?:[^\n]{0,30})'
    regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+(?:\S+(?:시|군|구)\s+)?\S+(?:읍|면|동)(?:\s+\S+(?:리|동))?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:\s*번지)?(?:[^\n]{0,30})'
  - name: road_address
    # Example: 서울특별시 강남구 테헤란로 123-4
    expr: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+[^\n]{0,40}(?:로|길)\s*\d{1,4}(?:-\d{1,4})?(?:[^\n]{0,30})'
    verify_regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+[^\n]{0,40}(?:로|길)\s*\d{1,4}(?:-\d{1,4})?(?:[^\n]{0,30})'
    regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+[^\n]{0,40}(?:로|길)\s*\d{1,4}(?:-\d{1,4})?(?:[^\n]{0,30})'
  - name: lot_address
    # Example: 경기도 성남시 분당구 정자동 12-3 번지
    expr: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+(?:\S+(?:시|군|구)\s+)?\S+(?:읍|면|동)(?:\s+\S+(?:리|동))?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:\s*번지)?(?:[^\n]{0,30})'
    verify_regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+(?:\S+(?:시|군|구)\s+)?\S+(?:읍|면|동)(?:\s+\S+(?:리|동))?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:\s*번지)?(?:[^\n]{0,30})'
    regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도)?\s+\S+(?:시|군|구)\s+(?:\S+(?:시|군|구)\s+)?\S+(?:읍|면|동)(?:\s+\S+(?:리|동))?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:\s*번지)?(?:[^\n]{0,30})'
  - name: area_only_address
    # Example: 서울시 관악구 청룡동
    expr: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도|시)?\s+\S+(?:시|군|구)\s+\S+(?:읍|면|동|리)'
    verify_regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도|시)?\s+\S+(?:시|군|구)\s+\S+(?:읍|면|동|리)'
    regex: '{SIDO}(?:특별시|광역시|특별자치시|특별자치도|도|시)?\s+\S+(?:시|군|구)\s+\S+(?:읍|면|동|리)'
  - name: lot_address_no_sido
    # Example: 파주군 금촌읍 금촌리 59의9번지
    expr: '[가-힣A-Za-z0-9]+(?:시|군|구)\s+[가-힣A-Za-z0-9]+(?:읍|면|동|리)\s+[가-힣A-Za-z0-9]+(?:리|동|읍|면)?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:번지)?'
    verify_regex: '[가-힣A-Za-z0-9]+(?:시|군|구)\s+[가-힣A-Za-z0-9]+(?:읍|면|동|리)\s+[가-힣A-Za-z0-9]+(?:리|동|읍|면)?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:번지)?'
    regex: '[가-힣A-Za-z0-9]+(?:시|군|구)\s+[가-힣A-Za-z0-9]+(?:읍|면|동|리)\s+[가-힣A-Za-z0-9]+(?:리|동|읍|면)?\s*\d{1,4}(?:의\d{1,4}|-\d{1,4})?(?:번지)?'

# Maximum captured match length used by the cursor scanner.
max_match_len: 220
