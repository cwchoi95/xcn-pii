global
    log stdout format raw local0
    maxconn 4096
    spread-checks 5

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client  5m
    timeout server  5m
    timeout tunnel 1h
    option tcplog
    option clitcpka
    option srvtcpka
    option tcp-smart-accept
    option tcp-smart-connect

resolvers docker
    nameserver dns 127.0.0.11:53
    hold valid 10s

frontend grpc_front
    bind *:50051
    default_backend grpc_back

backend grpc_back
    balance roundrobin
    option tcp-check
    default-server inter 1s fall 2 rise 1 slowstart 3s
    server-template pii 3 api-grpc:50051 check resolvers docker init-addr libc,none resolve-prefer ipv4
